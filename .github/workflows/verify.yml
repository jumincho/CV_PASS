name: Verify

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  structure-and-secrets:
    name: Structure & Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files
        run: |
          for f in README.md LICENSE app/build.gradle build.gradle settings.gradle gradle.properties; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done

      - name: No committed API keys (Google)
        run: |
          if grep -rEn 'AIza[0-9A-Za-z_-]{35}' app/src/ build.gradle settings.gradle app/build.gradle 2>/dev/null; then
            echo "::error::Hardcoded Google API key detected in tracked source"
            exit 1
          fi

      - name: No committed inspector code in source
        run: |
          if grep -rEn '"112255"|112255' app/src/main/java 2>/dev/null; then
            echo "::error::Hardcoded inspector code detected — must use BuildConfig.INSPECTOR_CODE"
            exit 1
          fi

      - name: .gitignore covers known secret paths
        run: |
          for path in "local.properties" "app/google-services.json"; do
            if ! grep -Fq "$path" .gitignore; then
              echo "::warning::$path should be in .gitignore"
            fi
          done

      - name: README links resolve to existing paths
        run: |
          # Extract relative links from README and verify they exist
          missing=0
          for link in $(grep -oE '\]\(\./[^)]+\)' README.md | sed 's|](\./||; s|)$||' | sort -u); do
            if [ ! -e "$link" ]; then
              echo "::warning::README links to missing path: $link"
              missing=$((missing+1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "::warning::$missing README link(s) point to non-existent paths"
          fi
