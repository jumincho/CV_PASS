name: Verify

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  structure-and-secrets:
    name: Structure & Secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Required files
        run: |
          for f in README.md LICENSE app/build.gradle build.gradle settings.gradle gradle.properties gradlew gradlew.bat; do
            if [ ! -f "$f" ]; then
              echo "::error::Missing required file: $f"
              exit 1
            fi
          done

      - name: No committed API keys (Google)
        run: |
          if grep -rEn 'AIza[0-9A-Za-z_-]{35}' app/src/ build.gradle settings.gradle app/build.gradle 2>/dev/null; then
            echo "::error::Hardcoded Google API key detected in tracked source"
            exit 1
          fi

      - name: No committed inspector code in source
        run: |
          if grep -rEn '"112255"|112255' app/src/main/java 2>/dev/null; then
            echo "::error::Hardcoded inspector code detected — must use BuildConfig.INSPECTOR_CODE"
            exit 1
          fi

      - name: local.properties is gitignored
        run: |
          if ! grep -Fq "local.properties" .gitignore; then
            echo "::error::local.properties must be in .gitignore"
            exit 1
          fi

  build:
    name: Build & Unit Test
    runs-on: ubuntu-latest
    env:
      ANDROID_SDK_ROOT: ${{ github.workspace }}/.android-sdk
      ANDROID_HOME: ${{ github.workspace }}/.android-sdk
    steps:
      - uses: actions/checkout@v4

      # AGP 7.0.x targets JDK 11.
      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "11"

      # Install the Android SDK by hand rather than via a third-party action,
      # so the workflow stays within an "actions created by GitHub only" policy.
      # cmdline-tools 9477386 is the last line that runs on JDK 11.
      - name: Install Android SDK
        run: |
          set -eux
          tools="$ANDROID_SDK_ROOT/cmdline-tools"
          mkdir -p "$tools"
          curl -fsSL -o /tmp/cmdline-tools.zip \
            https://dl.google.com/android/repository/commandlinetools-linux-9477386_latest.zip
          unzip -q /tmp/cmdline-tools.zip -d "$tools"
          mv "$tools/cmdline-tools" "$tools/latest"
          yes | "$tools/latest/bin/sdkmanager" --licenses >/dev/null
          "$tools/latest/bin/sdkmanager" \
            "platform-tools" "platforms;android-31" "build-tools;30.0.3"

      # The committed google-services.json is a build-only placeholder, so the
      # google-services plugin and assembleDebug run without real Firebase keys.
      - name: Assemble & unit test
        run: ./gradlew --no-daemon --stacktrace assembleDebug testDebugUnitTest
